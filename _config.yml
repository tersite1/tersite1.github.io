### Site Settings ###
title               : Minsuk Jang
description         : >-
                      Minsuk Jang — M.S. student at KAIST (Computational Intelligence Lab).
                      Civil engineer working on LiDAR-inertial SLAM, mobile mapping, UAV remote
                      sensing, and 3D digital twins for real-world infrastructure.
baseurl             : ""
repository          : tersite1/tersite1.github.io
remote_theme        : yousinix/portfolYOU
open_new_tab        : true                       # Opens external URLs in new tab


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:
  - pages/tags.html
  - pages/404.html
  - pages/index.md


### Author Info ###
author:
  name              : Minsuk Jang
  image             : /assets/img/minsuk0.png
  email             : minsukjang@kaist.ac.kr
  github            : tersite1
  linkedin          : jadenjang


### Posts (Awards) ###
permalink: /awards/:title


### Collections ###
collections:
  projects:
    output: true
    permalink: /projects/:name


### Analytics ###
analytics:
  enabled: true
  google:
    tracking_id: G-V6YLDPZ550


### Defaults for collections ###
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      comments: false


### Exclude from processing ###
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - "*.log"
  - _backup_minimal_light/
